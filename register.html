<!DOCTYPE html>
<html>
    <head>
        <title>Farmer Registraction</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div class="registration-box">
            <img src="IMAGES/logo.png"
            alt="FarmSmart"width="150">
            <h2>Farmer Registration</h2>
            <form action="home.html">
                 <input type="text"
placeholder="Full Name" required>
                <input type="text"
placeholder="Phone Number" required>
                 <input type="text"
placeholder="District" required>
             <select required>
                <option>Select Farmer Type</option>
                <option>Rice Farmer</option>
                <option>Cassava Farmer</option>
                <option>Maize Farmer</option>
                <option>Groundnut Farmer</option>
             </select>
             <button type="submit">
                Register
             </button>
             <button type="submit">
                Submit
             </button>
            </form>
        </div>
    </body>
</html>
